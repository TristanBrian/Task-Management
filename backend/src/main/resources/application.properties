# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Keep the rest (JWT, logging, etc.)
# Redis
spring.redis.url=${REDIS_URL:}

# spring.redis.password=${REDIS_PASSWORD:}   # if needed

# JWT
jwt.secret=${JWT_SECRET:mySuperSecretKey123!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.example.taskmanagement=DEBUG