# Database (use environment variables for production)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskdb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:taskdb}
spring.datasource.password=${DB_PASSWORD:popino123}
spring.redis.host=localhost
spring.redis.port=6379
# If you use a password:
# spring.redis.password=yourpassword
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT (use environment variable)
jwt.secret=${JWT_SECRET:mySuperSecretKey123!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.example.taskmanagement=DEBUG